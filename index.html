<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexChat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --wa-green: #075E54; --wa-teal: #128C7E; --white: #FFFFFF; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #F0F2F5; overflow: hidden; }
        
        header { background: var(--wa-green); color: white; padding: 15px 15px 10px; }
        .brand { font-size: 20px; font-weight: 700; cursor: pointer; padding: 5px; display: inline-block; }
        
        .chat-list { background: white; height: calc(100vh - 100px); overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #ccc; margin-right: 15px; }
        
        /* Slide-up Panels */
        .panel { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; transition: 0.3s; }
        .panel.open { top: 0; }
        .panel-header { background: var(--wa-teal); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<header>
    <div class="brand" id="adminBtn">NexChat Business</div>
</header>

<div class="chat-list">
    <div class="chat-item" onclick="showPanel('chatPanel')">
        <div class="avatar"></div>
        <div>
            <div style="font-weight:500">Technical Support</div>
            <div style="font-size:14px; color:#666">Click to test chat button</div>
        </div>
    </div>
</div>

<div id="adminPanel" class="panel">
    <div class="panel-header">
        <span onclick="closePanel('adminPanel')" style="cursor:pointer; font-size:24px;">←</span>
        <span>Master Admin</span>
    </div>
    <div style="padding: 20px;">
        <h3>Admin Settings Working!</h3>
        <p>Aapka email verify ho gaya hai.</p>
    </div>
</div>

<div id="chatPanel" class="panel">
    <div class="panel-header">
        <span onclick="closePanel('chatPanel')" style="cursor:pointer; font-size:24px;">←</span>
        <span>Chatting...</span>
    </div>
    <div style="padding: 20px; text-align: center; color: #888;">
        Chat interface open ho raha hai.
    </div>
</div>

<script>
    // --- TESTING WITHOUT FIREBASE FIRST ---
    let taps = 0;
    const adminBtn = document.getElementById('adminBtn');

    // 7-Tap Logic
    adminBtn.addEventListener('click', function() {
        taps++;
        console.log("Taps count:", taps);
        if (taps === 7) {
            let pass = prompt("Enter Admin Email:");
            if (pass === "vinayakglobaldream@gmail.com") {
                document.getElementById('adminPanel').classList.add('open');
            } else {
                alert("Wrong Email!");
            }
            taps = 0;
        }
    });

    function showPanel(id) {
        document.getElementById(id).classList.add('open');
    }

    function closePanel(id) {
        document.getElementById(id).classList.remove('open');
    }

    // Auto-reset taps after 3 seconds
    setInterval(() => { taps = 0; }, 3000);
</script>

</body>
</html>
