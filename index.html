<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexChat Pro Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --wa-green: #075E54; --wa-teal: #128C7E; --online: #25D366; --bg-gray: #e5ddd5; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--bg-gray); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Professional UI Improvements */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        header { background: var(--wa-green); color: white; padding: 15px 15px 0; z-index: 100; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .tab-bar { display: flex; text-transform: uppercase; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); margin-top: 10px; }
        .tab { flex: 1; text-align: center; padding-bottom: 12px; cursor: pointer; transition: 0.3s; }
        .tab.active { color: white; border-bottom: 4px solid white; }
        
        .content-area { flex: 1; overflow-y: auto; background: white; display: none; }
        .content-area.active { display: block; }
        
        .window { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: white; z-index: 4000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow-y: auto; }
        .window.active { top: 0; }
        
        .item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; overflow: hidden; position: relative; font-size: 20px; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .status-dot { position: absolute; bottom: 3px; right: 3px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; background: #bbb; }
        .status-dot.online { background: var(--online); }
        
        #dropMenu { display:none; position:absolute; right:10px; top:45px; background:white; color:black; width:200px; box-shadow:0 8px 24px rgba(0,0,0,0.2); border-radius:8px; z-index:5000; overflow:hidden; }
        .menu-item { padding:15px; font-size:15px; cursor:pointer; border-bottom:1px solid #f9f9f9; }
        .menu-item:hover { background: #f5f5f5; }

        #chatWindow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gray); z-index: 1500; display: none; flex-direction: column; }
        .chat-header { background: var(--wa-teal); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        .msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { max-width: 75%; padding: 8px 12px; margin: 5px 0; border-radius: 10px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.sent { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .msg.received { align-self: flex-start; background: white; border-top-left-radius: 0; }
        .msg-time { font-size: 10px; color: #888; text-align: right; margin-top: 4px; }

        .input-bar { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; font-size: 16px; }
        
        #fab { position:fixed; bottom:25px; right:25px; width:60px; height:60px; border-radius:50%; background:var(--wa-green); color:white; border:none; font-size:24px; box-shadow:0 4px 15px rgba(0,0,0,0.4); z-index:1000; }
        
        .edit-group { margin-bottom: 20px; padding: 0 25px; }
        .edit-group label { color: var(--wa-teal); font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .edit-group input, .edit-group select { width: 100%; padding: 10px 0; border: none; border-bottom: 2px solid #eee; outline: none; font-size: 16px; }
    </style>
</head>
<body>

<div id="loginPage" class="overlay">
    <div style="background:var(--wa-green); width:70px; height:70px; border-radius:18px; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
        <span style="color:white; font-size:40px; font-weight:bold;">N</span>
    </div>
    <h2 style="color:var(--wa-green); margin-bottom:5px;">NexChat Business</h2>
    <p style="color:gray; margin-bottom:20px;">Fast, Secure & Professional</p>
    <input type="email" id="logEmail" placeholder="Email Address" style="width:85%; padding:14px; margin:10px; border:1px solid #ddd; border-radius:10px;">
    <input type="password" id="logPass" placeholder="Password" style="width:85%; padding:14px; border:1px solid #ddd; border-radius:10px;">
    <button onclick="authAction()" style="width:88%; padding:15px; background:var(--wa-teal); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:15px; font-size:16px;">Get Started</button>
</div>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:22px; font-weight:bold;">NexChat Pro</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span onclick="toggleMenu()" style="cursor:pointer; font-size: 24px;">⋮</span>
            <div id="dropMenu">
                <div class="menu-item" onclick="openProfile()">My Profile</div>
                <div class="menu-item" onclick="alert('Feature coming soon!')">New Group</div>
                <div class="menu-item" style="color:red;" onclick="auth.signOut()">Logout</div>
            </div>
        </div>
    </div>
    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('chats', this)">Chats</div>
        <div class="tab" onclick="switchTab('status', this)">Status</div>
        <div class="tab" onclick="switchTab('calls', this)">Calls</div>
    </div>
</header>

<div id="s-chats" class="content-area active"><div id="userList"></div></div>
<div id="s-status" class="content-area" style="text-align:center; padding-top:50px; color:gray;">Status updates will appear here.</div>
<div id="s-calls" class="content-area" style="text-align:center; padding-top:50px; color:gray;">No recent voice or video calls.</div>

<button id="fab" onclick="alert('Click a user from the list to start chatting!')">💬</button>

<div id="profilePage" class="window">
    <div class="chat-header">
        <span onclick="document.getElementById('profilePage').classList.remove('active')" style="cursor:pointer; font-size:24px;">←</span>
        <span>Profile Settings</span>
    </div>
    <div style="text-align: center; padding: 30px 20px;">
        <div id="profPic" onclick="triggerUpload()" style="width:120px; height:120px; border-radius:50%; background:var(--wa-green); color:white; display:flex; align-items:center; justify-content:center; font-size:45px; margin: 0 auto; cursor:pointer; overflow:hidden; border: 4px solid #f0f0f0; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">V</div>
        <p style="color:var(--wa-teal); font-weight:bold; margin-top:15px; cursor:pointer;" onclick="triggerUpload()">CHANGE PROFILE PHOTO 📷</p>
    </div>
    
    <div class="edit-group"><label>Full Name</label><input type="text" id="editName" placeholder="Vinayak Tiwari"></div>
    <div class="edit-group"><label>App Language</label><select id="appLang"><option value="en">English (Official)</option></select></div>
    <div class="edit-group"><label>Select Country</label>
        <select id="editCountry">
            <option value="India">India</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
            <option value="UAE">UAE</option>
        </select>
    </div>
    
    <button onclick="saveProfile()" style="width:90%; padding:16px; background:var(--wa-green); color:white; border:none; border-radius:12px; margin: 20px 5%; font-weight:bold; font-size:16px; box-shadow: 0 4px 10px rgba(7,94,84,0.3);">UPDATE PROFILE ✅</button>
</div>

<div id="chatWindow">
    <div class="chat-header">
        <span onclick="closeChat()" style="font-size:24px; cursor:pointer;">←</span>
        <div id="targetAvatar" style="width:35px; height:35px; border-radius:50%; background:white; overflow:hidden;"></div>
        <div id="activeUserName" style="font-weight:bold; flex:1;">User</div>
    </div>
    <div class="msg-container" id="msgBox"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button onclick="sendMsg()" style="background:var(--wa-teal); color:white; border:none; border-radius:50%; width:48px; height:48px; font-size:20px; display:flex; align-items:center; justify-content:center;">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB56IOvxuPlVmv8vCRGcAKk0baP-WOhjyI",
        authDomain: "nexchat-48faa.firebaseapp.com",
        projectId: "nexchat-48faa",
        databaseURL: "https://nexchat-48faa-default-rtdb.firebaseio.com",
        storageBucket: "nexchat-48faa.appspot.com",
        messagingSenderId: "1008162413503",
        appId: "1:1008162413503:web:9da287c9aff061b9445f0a"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore(), rtdb = firebase.database();
    let me = null, targetId = null, base64Photo = "";

    function authAction() {
        const e = document.getElementById('logEmail').value, p = document.getElementById('logPass').value;
        if(!e || !p) return alert("Enter details");
        auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
    }

    auth.onAuthStateChanged(user => {
        if(user) { 
            me = user; 
            document.getElementById('loginPage').style.display = 'none';
            rtdb.ref('/status/'+user.uid).set('online');
            rtdb.ref('/status/'+user.uid).onDisconnect().set('offline');
            loadUsers();
        } else { document.getElementById('loginPage').style.display = 'flex'; }
    });

    // Smart Gallery Upload (With Compression)
    function triggerUpload() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 300;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Photo = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('profPic').innerHTML = `<img src="${base64Photo}">`;
                }
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function saveProfile() {
        const data = {
            name: document.getElementById('editName').value,
            country: document.getElementById('editCountry').value,
            photoURL: base64Photo,
            email: me.email
        };
        db.collection("users").doc(me.uid).set(data, { merge: true }).then(() => {
            alert("Profile Synced Professionally! ✅");
            document.getElementById('profilePage').classList.remove('active');
        });
    }

    function openProfile() {
        db.collection("users").doc(me.uid).get().then(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('editName').value = d.name || "";
                document.getElementById('editCountry').value = d.country || "India";
                if(d.photoURL) {
                    document.getElementById('profPic').innerHTML = `<img src="${d.photoURL}">`;
                    base64Photo = d.photoURL;
                }
            }
        });
        document.getElementById('profilePage').classList.add('active');
        toggleMenu();
    }

    function loadUsers() {
        db.collection("users").onSnapshot(snap => {
            const list = document.getElementById('userList'); list.innerHTML = "";
            snap.forEach(doc => {
                if(doc.id !== me.uid) {
                    const d = doc.data();
                    const div = document.createElement('div'); div.className = "item";
                    const avatarContent = d.photoURL ? `<img src="${d.photoURL}">` : (d.name || d.email)[0].toUpperCase();
                    div.innerHTML = `
                        <div class="avatar">${avatarContent}<div id="dot-${doc.id}" class="status-dot"></div></div>
                        <div style="margin-left:15px; flex:1;">
                            <div style="display:flex; justify-content:space-between;">
                                <b>${d.name || d.email.split('@')[0]}</b>
                                <small style="color:#aaa;">${d.country || ''}</small>
                            </div>
                            <small style="color:gray;">Tap to chat...</small>
                        </div>`;
                    div.onclick = () => openChat(doc.id, d.name || d.email.split('@')[0], d.photoURL);
                    list.appendChild(div);
                    rtdb.ref('/status/'+doc.id).on('value', s => {
                        const dot = document.getElementById('dot-'+doc.id);
                        if(dot) s.val()==='online' ? dot.classList.add('online') : dot.classList.remove('online');
                    });
                }
            });
        });
    }

    function openChat(id, name, photo) { 
        targetId = id; 
        document.getElementById('activeUserName').innerText = name; 
        document.getElementById('targetAvatar').innerHTML = photo ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;">` : "";
        document.getElementById('chatWindow').style.display = 'flex'; 
        loadMessages(id); 
    }

    function sendMsg() {
        const val = document.getElementById('msgInput').value; if(!val) return;
        db.collection("chats").add({ 
            from: me.uid, to: targetId, msg: val, 
            time: firebase.firestore.FieldValue.serverTimestamp() 
        });
        document.getElementById('msgInput').value = "";
    }

    function loadMessages(id) {
        db.collection("chats").orderBy("time").onSnapshot(snap => {
            const box = document.getElementById('msgBox'); box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                if((d.from === me.uid && d.to === id) || (d.from === id && d.to === me.uid)) {
                    const m = document.createElement('div');
                    m.className = d.from === me.uid ? "msg sent" : "msg received";
                    const time = d.time ? new Date(d.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                    m.innerHTML = `${d.msg} <div class="msg-time">${time}</div>`; 
                    box.appendChild(m);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chatWindow').style.display = 'none'; }
    function toggleMenu() { const m = document.getElementById('dropMenu'); m.style.display = m.style.display === 'none' ? 'block' : 'none'; }
    function switchTab(name, el) {
        document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
        document.getElementById('s-'+name).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
