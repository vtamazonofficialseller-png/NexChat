<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexChat Pro Gold - 100% Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --green: #075E54; --teal: #128C7E; --light: #dcf8c6; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Fixed Header Like WhatsApp */
        header { background: var(--green); color: white; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .top { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .tabs { display: flex; text-align: center; }
        .tab { flex: 1; padding: 12px; cursor: pointer; opacity: 0.7; font-weight: bold; border-bottom: 3px solid transparent; }
        .tab.active { opacity: 1; border-bottom: 3px solid white; }

        /* Menu logic */
        #menu { position: absolute; right: 10px; top: 55px; background: white; color: black; border-radius: 4px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 160px; z-index: 2000; }
        #menu div { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }

        /* Main Screen Pages */
        .page { display: none; margin-top: 105px; height: calc(100vh - 105px); overflow-y: auto; background: white; }
        .page.active { display: block; }

        /* Overlays (Profile & Chat) */
        .full-screen { position: fixed; inset: 0; background: white; z-index: 3000; display: none; flex-direction: column; }
        .fs-header { background: var(--teal); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }

        /* Profile Photo Setup */
        .prof-cont { width: 150px; height: 150px; border-radius: 50%; background: #eee; margin: 30px auto; border: 4px solid var(--teal); position: relative; overflow: hidden; }
        .prof-cont img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Chat Bubble */
        #msg-list { flex: 1; padding: 15px; display: flex; flex-direction: column; background: #e5ddd5; overflow-y: auto; }
        .bbl { padding: 8px 12px; margin: 5px; border-radius: 8px; max-width: 75%; }
        .me { align-self: flex-end; background: var(--light); }
        .you { align-self: flex-start; background: white; }

        /* User List Style */
        .u-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .u-img { width: 50px; height: 50px; border-radius: 50%; background: #ddd; margin-right: 15px; }
    </style>
</head>
<body>

<header>
    <div class="top">
        <span style="font-size: 20px; font-weight: bold;">NexChat Gold</span>
        <div style="display: flex; gap: 15px;">
            <span id="adminBtn" style="display:none; color:gold; border:1px solid gold; padding:2px 5px; border-radius:4px; font-size:12px;">ADMIN</span>
            <span onclick="toggleMenu()" style="cursor:pointer; font-size: 22px;">⋮</span>
        </div>
    </div>
    <div class="tabs">
        <div class="tab active" id="t-chats" onclick="setTab('chats')">CHATS</div>
        <div class="tab" id="t-status" onclick="setTab('status')">STATUS</div>
        <div class="tab" id="t-calls" onclick="setTab('calls')">CALLS</div>
    </div>
    <div id="menu">
        <div onclick="openFS('prof-win')">Settings</div>
        <div onclick="location.reload()">Refresh App</div>
        <div onclick="auth.signOut()" style="color:red;">Logout</div>
    </div>
</header>

<div id="p-chats" class="page active"><div id="users">Users load ho rahe hain...</div></div>
<div id="p-status" class="page" style="text-align:center; padding-top:50px;">Koi Status nahi hai.</div>
<div id="p-calls" class="page" style="text-align:center; padding-top:50px;">Calls khali hain.</div>

<div id="prof-win" class="full-screen">
    <div class="fs-header"><span onclick="closeFS('prof-win')" style="cursor:pointer; font-size:24px;">←</span> Profile</div>
    <div style="text-align:center;">
        <div class="prof-cont" onclick="document.getElementById('imgInp').click()">
            <img id="my-pic" src="https://via.placeholder.com/150">
        </div>
        <input type="file" id="imgInp" hidden accept="image/*" onchange="preview(this)">
        <p style="color:var(--teal);">Photo Badalye 📷</p>
        <input type="text" id="my-name" placeholder="Naam" style="width:80%; padding:12px; margin-top:20px; border:1px solid #ccc; border-radius:8px;">
        <button onclick="saveProfile()" style="width:85%; padding:15px; margin-top:30px; background:var(--teal); color:white; border:none; border-radius:10px; font-weight:bold;">SAB KUCH SAVE KAREIN</button>
    </div>
</div>

<div id="chat-win" class="full-screen">
    <div class="fs-header">
        <span onclick="closeFS('chat-win')" style="cursor:pointer; font-size:24px;">←</span>
        <img id="chat-pic" style="width:35px; height:35px; border-radius:50%; background:#ddd;">
        <span id="chat-name">User</span>
    </div>
    <div id="msg-list"></div>
    <div style="padding:10px; background:#f0f0f0; display:flex; gap:10px;">
        <input type="text" id="msg-inp" placeholder="Message..." style="flex:1; padding:12px; border:none; border-radius:25px;">
        <button onclick="sendMsg()" style="background:var(--teal); color:white; border:none; width:45px; height:45px; border-radius:50%;">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB56IOvxuPlVmv8vCRGcAKk0baP-WOhjyI",
        authDomain: "nexchat-48faa.firebaseapp.com",
        projectId: "nexchat-48faa",
        databaseURL: "https://nexchat-48faa-default-rtdb.firebaseio.com",
        storageBucket: "nexchat-48faa.appspot.com",
        messagingSenderId: "1008162413503",
        appId: "1:1008162413503:web:9da287c9aff061b9445f0a"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let me = null, target = null, base64 = "";

    // Fix 1: Tab Switching
    function setTab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-'+id).classList.add('active');
        document.getElementById('menu').style.display = 'none';
    }

    // Fix 2: Menu & Overlays
    function toggleMenu() {
        const m = document.getElementById('menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }
    function openFS(id) { 
        document.getElementById(id).style.display = 'flex'; 
        if(id === 'prof-win') loadData();
        document.getElementById('menu').style.display = 'none';
    }
    function closeFS(id) { document.getElementById(id).style.display = 'none'; }

    // Fix 3: Profile Picture
    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 300;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 300);
                    base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('my-pic').src = base64;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveProfile() {
        db.collection("users").doc(me.uid).set({
            name: document.getElementById('my-name').value,
            photoURL: base64,
            email: me.email
        }, {merge:true}).then(() => { alert("Profile Saved! ✅"); closeFS('prof-win'); });
    }

    function loadData() {
        db.collection("users").doc(me.uid).get().then(doc => {
            if(doc.exists){
                const d = doc.data();
                document.getElementById('my-name').value = d.name || "";
                if(d.photoURL) { base64 = d.photoURL; document.getElementById('my-pic').src = d.photoURL; }
            }
        });
    }

    // Fix 4: Auth & Lists
    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            if(user.email === "vinayaktiwari@gmail.com") document.getElementById('adminBtn').style.display = 'block';
            fetchUsers();
        } else {
            const e = prompt("Email:"), p = prompt("Password:");
            auth.signInWithEmailAndPassword(e,p).catch(()=>auth.createUserWithEmailAndPassword(e,p));
        }
    });

    function fetchUsers() {
        db.collection("users").onSnapshot(snap => {
            const div = document.getElementById('users'); div.innerHTML = "";
            snap.forEach(doc => {
                if(doc.id !== me.uid) {
                    const d = doc.data();
                    div.innerHTML += `<div class="u-item" onclick="openChat('${doc.id}','${d.name||d.email}','${d.photoURL||''}')">
                        <img class="u-img" src="${d.photoURL || 'https://via.placeholder.com/50'}">
                        <b>${d.name || d.email}</b>
                    </div>`;
                }
            });
        });
    }

    function openChat(id, name, pic) {
        target = id;
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-pic').src = pic || 'https://via.placeholder.com/50';
        document.getElementById('chat-win').style.display = 'flex';
        loadMsgs();
    }

    function sendMsg() {
        const txt = document.getElementById('msg-inp').value;
        if(!txt) return;
        db.collection("chats").add({ from: me.uid, to: target, msg: txt, time: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('msg-inp').value = "";
    }

    function loadMsgs() {
        db.collection("chats").orderBy("time").onSnapshot(snap => {
            const list = document.getElementById('msg-list'); list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                if((d.from===me.uid && d.to===target) || (d.from===target && d.to===me.uid)) {
                    list.innerHTML += `<div class="bbl ${d.from===me.uid?'me':'you'}">${d.msg}</div>`;
                }
            });
            list.scrollTop = list.scrollHeight;
        });
    }
</script>
</body>
</html>
