<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexChat Pro Gold - Final Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        :root { --green: #075E54; --teal: #128C7E; --light: #dcf8c6; }
        body { margin: 0; font-family: sans-serif; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--green); color: white; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .tabs { display: flex; text-align: center; }
        .tab { flex: 1; padding: 12px; cursor: pointer; font-weight: bold; border-bottom: 3px solid transparent; opacity: 0.7; }
        .tab.active { opacity: 1; border-bottom: 3px solid white; }
        #mainMenu { position: absolute; right: 10px; top: 55px; background: white; color: black; border-radius: 4px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 160px; z-index: 2000; }
        #mainMenu div { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .content-area { margin-top: 100px; height: calc(100vh - 100px); overflow-y: auto; background: white; }
        .page { display: none; height: 100%; }
        .page.active { display: block; }
        .full-page { position: fixed; inset: 0; background: white; z-index: 5000; display: none; flex-direction: column; }
        .fp-header { background: var(--teal); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .profile-box { width: 150px; height: 150px; border-radius: 50%; background: #eee; margin: 30px auto; border: 4px solid var(--teal); overflow: hidden; cursor: pointer; }
        .profile-box img { width: 100%; height: 100%; object-fit: cover; }
        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .user-img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; object-fit: cover; }
        .verify-dot { width: 12px; height: 12px; border-radius: 50%; margin-left: auto; }
        .dot-male { background: #0084ff; } .dot-female { background: #ff69b4; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <b style="font-size: 20px;">NexChat Pro Gold</b>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="adminBadge" style="display:none; color:gold; border:1px solid gold; padding:2px 5px; border-radius:4px; font-size:10px;">ADMIN</div>
            <span onclick="toggleM()" style="cursor:pointer; font-size: 22px;">⋮</span>
        </div>
    </div>
    <div class="tabs">
        <div class="tab active" id="t-c" onclick="sw('c')">CHATS</div>
        <div class="tab" id="t-s" onclick="sw('s')">STATUS</div>
        <div class="tab" id="t-cl" onclick="sw('cl')">CALLS</div>
    </div>
    <div id="mainMenu">
        <div onclick="openO('prof-win')">Settings</div>
        <div onclick="location.reload()">Refresh App</div>
        <div onclick="auth.signOut()">Logout</div>
    </div>
</header>

<div class="content-area">
    <div id="p-c" class="page active"><div id="userList"></div></div>
    <div id="p-s" class="page" style="text-align:center; padding-top:50px;">No updates.</div>
    <div id="p-cl" class="page" style="text-align:center; padding-top:50px;">No calls.</div>
</div>

<div id="prof-win" class="full-page">
    <div class="fp-header"><span onclick="closeO('prof-win')" style="cursor:pointer; font-size:25px;">←</span> Settings</div>
    <div style="text-align:center; padding:20px;">
        <div class="profile-box" onclick="document.getElementById('fileInp').click()">
            <img id="myView" src="https://via.placeholder.com/150?text=No+Photo">
        </div>
        <input type="file" id="fileInp" hidden accept="image/*" onchange="hPic(this)">
        <p style="color:var(--teal); font-weight:bold;" onclick="document.getElementById('fileInp').click()">CHANGE PHOTO 📷</p>
        <input type="text" id="myName" placeholder="Your Name" style="width:80%; padding:12px; margin-top:10px; border:1px solid #ccc; border-radius:8px;">
        <select id="myGen" style="width:85%; padding:12px; margin-top:15px; border:1px solid #ccc; border-radius:8px;">
            <option value="Male">Male (Verified Blue)</option>
            <option value="Female">Female (Verified Pink)</option>
        </select>
        <button onclick="saveP()" style="width:85%; padding:15px; margin-top:30px; background:var(--teal); color:white; border:none; border-radius:10px; font-weight:bold;">SAVE & UPDATE ✅</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB56IOvxuPlVmv8vCRGcAKk0baP-WOhjyI",
        authDomain: "nexchat-48faa.firebaseapp.com",
        projectId: "nexchat-48faa",
        databaseURL: "https://nexchat-48faa-default-rtdb.firebaseio.com",
        storageBucket: "nexchat-48faa.appspot.com",
        messagingSenderId: "1008162413503",
        appId: "1:1008162413503:web:9da287c9aff061b9445f0a"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.firestore();
    let me = null, b64 = "";

    function sw(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-'+id).classList.add('active');
        toggleM(true);
    }

    function toggleM(h = false) {
        const m = document.getElementById('mainMenu');
        m.style.display = h ? 'none' : (m.style.display === 'block' ? 'none' : 'block');
    }

    function openO(id) { document.getElementById(id).style.display = 'flex'; if(id==='prof-win') loadD(); toggleM(true); }
    function closeO(id) { document.getElementById(id).style.display = 'none'; }

    function hPic(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 250; canvas.height = 250;
                    canvas.getContext('2d').drawImage(img, 0, 0, 250, 250);
                    b64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('myView').src = b64;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveP() {
        db.collection("users").doc(me.uid).set({
            name: document.getElementById('myName').value,
            gender: document.getElementById('myGen').value,
            photoURL: b64,
            email: me.email
        }, {merge:true}).then(() => { alert("Profile Synced! ✅"); closeO('prof-win'); });
    }

    function loadD() {
        db.collection("users").doc(me.uid).get().then(doc => {
            if(doc.exists){
                const d = doc.data();
                document.getElementById('myName').value = d.name || "";
                document.getElementById('myGen').value = d.gender || "Male";
                if(d.photoURL) { b64 = d.photoURL; document.getElementById('myView').src = d.photoURL; }
            }
        });
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            if(user.email === "vinayaktiwari@gmail.com") document.getElementById('adminBadge').style.display = 'block';
            db.collection("users").onSnapshot(snap => {
                const list = document.getElementById('userList'); list.innerHTML = "";
                snap.forEach(doc => {
                    if(doc.id !== me.uid) {
                        const d = doc.data();
                        list.innerHTML += `<div class="user-row">
                            <img class="user-img" src="${d.photoURL || 'https://via.placeholder.com/50'}">
                            <b>${d.name || d.email}</b>
                            <div class="verify-dot ${d.gender==='Female'?'dot-female':'dot-male'}"></div>
                        </div>`;
                    }
                });
            });
        } else {
            const e = prompt("Email:"), p = prompt("Password:");
            auth.signInWithEmailAndPassword(e,p).catch(()=>auth.createUserWithEmailAndPassword(e,p));
        }
    });
</script>
</body>
</html>
