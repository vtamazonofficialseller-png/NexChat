<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexChat Pro Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --wa-green: #075E54; --wa-teal: #128C7E; --online: #25D366; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        header { background: var(--wa-green); color: white; padding: 15px 15px 0; z-index: 100; }
        .tab-bar { display: flex; text-transform: uppercase; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); margin-top: 10px; }
        .tab { flex: 1; text-align: center; padding-bottom: 12px; cursor: pointer; }
        .tab.active { color: white; border-bottom: 4px solid white; }

        .content-area { flex: 1; overflow-y: auto; background: white; display: none; }
        .content-area.active { display: block; }

        /* User List Styles */
        .item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .avatar-box { position: relative; margin-right: 15px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #075E54; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; background: #ccc; }
        .status-dot.online { background: var(--online); }

        /* Chat Window */
        #chatWindow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e5ddd5; z-index: 1500; display: none; flex-direction: column; }
        .chat-header { background: var(--wa-teal); color: white; padding: 10px; display: flex; align-items: center; gap: 12px; }
        .typing-indicator { font-size: 12px; color: #dcf8c6; display: none; }
        
        .msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .input-bar { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }
        
        /* Logo Styling */
        .logo-svg { width: 80px; height: 80px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="loginPage" class="overlay">
    <svg class="logo-svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#075E54"/><path d="M70 50c0 11-9 20-20 20-3 0-7-1-10-3l-10 3 3-10c-2-3-3-7-3-10 0-11 9-20 20-20s20 9 20 20z" fill="white"/></svg>
    <h2 style="color:var(--wa-green)">NexChat Business</h2>
    <input type="email" id="logEmail" placeholder="Email" style="width:80%; padding:12px; margin:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="password" id="logPass" placeholder="Password" style="width:80%; padding:12px; margin:10px; border:1px solid #ddd; border-radius:8px;">
    <button onclick="authAction()" style="width:85%; padding:12px; background:var(--wa-teal); color:white; border:none; border-radius:8px; font-weight:bold;">Login</button>
</div>

<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:20px; font-weight:bold;" id="adminTrigger">NexChat Pro</div>
        <div>🔍 ⋮</div>
    </div>
    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('chats', this)">Chats</div>
        <div class="tab" onclick="switchTab('status', this)">Status</div>
        <div class="tab" onclick="switchTab('calls', this)">Calls</div>
    </div>
</header>

<div id="s-chats" class="content-area active">
    <div id="userList"></div>
</div>
<div id="s-status" class="content-area" style="padding:20px;">No updates.</div>
<div id="s-calls" class="content-area" style="padding:20px;">No calls.</div>

<div id="chatWindow">
    <div class="chat-header">
        <span onclick="closeChat()" style="font-size:24px; cursor:pointer;">←</span>
        <div>
            <div id="activeUserName" style="font-weight:bold;">User</div>
            <div id="typingText" class="typing-indicator">typing...</div>
        </div>
    </div>
    <div class="msg-container" id="msgBox"></div>
    <div class="input-bar">
        <input type="text" id="msgInput" placeholder="Type a message..." oninput="handleTyping()">
        <button onclick="sendMsg()" style="background:var(--wa-teal); color:white; border:none; border-radius:50%; width:45px; height:45px;">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB56IOvxuPlVmv8vCRGcAKk0baP-WOhjyI",
        authDomain: "nexchat-48faa.firebaseapp.com",
        projectId: "nexchat-48faa",
        databaseURL: "https://nexchat-48faa-default-rtdb.firebaseio.com",
        storageBucket: "nexchat-48faa.firebasestorage.app",
        messagingSenderId: "1008162413503",
        appId: "1:1008162413503:web:9da287c9aff061b9445f0a"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const rtdb = firebase.database(); // Realtime DB for presence

    let me = null;
    let targetId = null;
    let typingTimeout;

    // 1. Auth & Presence
    function authAction() {
        const e = document.getElementById('logEmail').value, p = document.getElementById('logPass').value;
        auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            me = user;
            document.getElementById('loginPage').style.display = 'none';
            setUserOnline(user.uid);
            loadUsers();
        } else {
            document.getElementById('loginPage').style.display = 'flex';
        }
    });

    function setUserOnline(uid) {
        const statusRef = rtdb.ref('/status/' + uid);
        statusRef.set('online');
        statusRef.onDisconnect().set('offline');
        db.collection("users").doc(uid).set({ email: me.email, status: 'online' }, { merge: true });
    }

    // 2. Load Users with Online Status
    function loadUsers() {
        db.collection("users").onSnapshot(snap => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snap.forEach(doc => {
                if(doc.id !== me.uid) {
                    const data = doc.data();
                    const userDiv = document.createElement('div');
                    userDiv.className = "item";
                    userDiv.innerHTML = `
                        <div class="avatar-box">
                            <div class="avatar">${data.email[0].toUpperCase()}</div>
                            <div id="dot-${doc.id}" class="status-dot"></div>
                        </div>
                        <div><b>${data.email}</b></div>`;
                    userDiv.onclick = () => openChat(doc.id, data.email);
                    list.appendChild(userDiv);
                    
                    // Real-time online dot check
                    rtdb.ref('/status/' + doc.id).on('value', s => {
                        const dot = document.getElementById('dot-' + doc.id);
                        if(dot) s.val() === 'online' ? dot.classList.add('online') : dot.classList.remove('online');
                    });
                }
            });
        });
    }

    // 3. Typing Indicator Logic
    function handleTyping() {
        rtdb.ref('/typing/' + me.uid).set({ chattingWith: targetId });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => rtdb.ref('/typing/' + me.uid).remove(), 2000);
    }

    function openChat(id, email) {
        targetId = id;
        document.getElementById('activeUserName').innerText = email;
        document.getElementById('chatWindow').style.display = 'flex';
        loadMessages(id);
        
        // Listen for partner typing
        rtdb.ref('/typing/' + id).on('value', s => {
            const indicator = document.getElementById('typingText');
            if(s.exists() && s.val().chattingWith === me.uid) indicator.style.display = 'block';
            else indicator.style.display = 'none';
        });
    }

    function closeChat() { 
        document.getElementById('chatWindow').style.display = 'none';
        rtdb.ref('/typing/' + me.uid).remove();
    }

    function sendMsg() {
        const val = document.getElementById('msgInput').value;
        if(!val) return;
        db.collection("chats").add({
            from: me.uid, to: targetId, msg: val, time: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('msgInput').value = "";
        rtdb.ref('/typing/' + me.uid).remove();
    }

    function loadMessages(id) {
        db.collection("chats").orderBy("time").onSnapshot(snap => {
            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                if((d.from === me.uid && d.to === id) || (d.from === id && d.to === me.uid)) {
                    const mDiv = document.createElement('div');
                    mDiv.style = d.from === me.uid ? "align-self:flex-end; background:#dcf8c6; padding:8px; margin:5px; border-radius:10px;" : "align-self:flex-start; background:white; padding:8px; margin:5px; border-radius:10px;";
                    mDiv.innerText = d.msg;
                    box.appendChild(mDiv);
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function switchTab(name, el) {
        document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('s-'+name).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
